<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="a" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>
    <radialGradient id="b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="url(#a)" stroke-width="1.2" opacity="0.35"/>
  <!-- Main circle -->
  <circle cx="16" cy="16" r="11" fill="url(#a)"/>
  <!-- Inner shine -->
  <circle cx="16" cy="16" r="11" fill="url(#b)"/>
  <!-- Small orbit dot -->
  <circle cx="16" cy="5.5" r="2.2" fill="#fff" opacity="0.9"/>
</svg>
